<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión IPTV - Vidanet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6EC1E4', secondary: '#54595F', textGray: '#7A7A7A',
                        accent: '#61CE70', blue: '#1597E5', green: '#3CCF4E',
                        orange: '#F77E21', light: '#F9F9F9', dark: '#1A1A1A'
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F9F9F9; }
        .tab-active { border-bottom: 3px solid #6EC1E4; color: #1A1A1A; font-weight: 600; }
    </style>
</head>
<body class="font-sans text-dark min-h-screen">

    <!-- HEADER -->
    <header class="bg-white shadow-sm py-4 px-6 flex items-center justify-between mb-8">
        <div class="flex items-center gap-4">
            <img src="https://vidanet.com.ve/wp-content/uploads/2022/10/logohb.png" alt="Logo" class="h-12">
            <div class="border-l-2 border-primary pl-4">
                <h1 class="text-xl font-bold text-dark">Gestión de Clientes IPTV</h1>
                <p class="text-xs text-textGray">Panel Seguro</p>
            </div>
        </div>
        <button onclick="resetPassword()" class="text-xs text-secondary hover:text-primary transition border px-3 py-1 rounded-full">Cerrar Sesión</button>
    </header>

    <!-- MAIN -->
    <main class="container mx-auto px-6 pb-10">
        <!-- TABS -->
        <div class="flex space-x-4 border-b border-gray-200 mb-6">
            <button onclick="openTab('crear')" id="btn-crear" class="px-4 py-2 text-textGray hover:text-dark transition tab-active">1. Crear Usuarios</button>
            <button onclick="openTab('borrar')" id="btn-borrar" class="px-4 py-2 text-textGray hover:text-dark transition">2. Borrar Usuarios</button>
            <button onclick="openTab('lista')" id="btn-lista" class="px-4 py-2 text-textGray hover:text-dark transition">3. Ver Lista</button>
            <button onclick="openTab('individual')" id="btn-individual" class="px-4 py-2 text-textGray hover:text-dark transition">4. Búsqueda Individual</button>
        </div>

        <!-- PANEL CREAR -->
        <div id="panel-crear" class="tab-panel">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <h3 class="font-semibold text-lg mb-4 text-dark flex items-center gap-2">
                        <span class="bg-primary/10 text-primary p-2 rounded-lg">📂</span> Fuente de Datos
                    </h3>
                    <div class="space-y-4">
                        <input type="file" id="fileCrear" accept=".xlsx,.xls,.csv,.txt" onchange="processFile('crear')" class="block w-full text-sm text-textGray file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 cursor-pointer">
                        <textarea id="textCrear" rows="5" class="w-full border border-gray-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-primary focus:outline-none" placeholder="Nombre, Cedula, Pantallas&#10;Juan Perez, V12345678, 2"></textarea>
                        <button onclick="processText('crear')" class="w-full bg-light text-dark py-2 rounded-lg font-medium hover:bg-gray-200 transition text-sm">Procesar Texto</button>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex flex-col">
                    <h3 class="font-semibold text-lg mb-4 text-dark">Revisión</h3>
                    <div class="flex-1 overflow-auto max-h-64 border rounded-lg mb-4">
                        <table class="min-w-full divide-y divide-gray-200 text-xs">
                            <thead class="bg-gray-50 sticky top-0"><tr><th class="px-4 py-2 text-left font-semibold text-secondary">Nombre</th><th class="px-4 py-2 text-left font-semibold text-secondary">Cedula</th><th class="px-4 py-2 text-left font-semibold text-secondary">Pantallas</th></tr></thead>
                            <tbody id="tableCrearBody" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                    <button onclick="startCreation()" class="w-full bg-accent hover:bg-green-500 text-white font-bold py-3 rounded-xl transition shadow-lg flex items-center justify-center gap-2">🚀 Crear Usuarios</button>
                    <div id="logCrear" class="mt-4 bg-dark rounded-lg p-3 h-32 overflow-auto text-xs font-mono text-light"></div>
                </div>
            </div>
        </div>

        <!-- PANEL BORRAR -->
        <div id="panel-borrar" class="tab-panel hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <h3 class="font-semibold text-lg mb-4 text-dark flex items-center gap-2">
                        <span class="bg-orange/10 text-orange p-2 rounded-lg">🗑️</span> Lista a Eliminar
                    </h3>
                    <div class="space-y-4">
                        <input type="file" id="fileBorrar" accept=".xlsx,.xls,.csv,.txt" onchange="processFile('borrar')" class="block w-full text-sm text-textGray file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange/10 file:text-orange hover:file:bg-orange/20 cursor-pointer">
                        <textarea id="textBorrar" rows="5" class="w-full border border-gray-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-orange focus:outline-none" placeholder="V12345678&#10;V87654321"></textarea>
                        <button onclick="processText('borrar')" class="w-full bg-light text-dark py-2 rounded-lg font-medium hover:bg-gray-200 transition text-sm">Procesar Lista</button>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex flex-col">
                    <h3 class="font-semibold text-lg mb-4 text-dark">DocIDs a eliminar</h3>
                    <div class="flex-1 overflow-auto max-h-64 border rounded-lg mb-4">
                         <table class="min-w-full divide-y divide-gray-200 text-xs"><thead class="bg-gray-50 sticky top-0"><tr><th class="px-4 py-2 text-left font-semibold text-secondary">Cedula</th></tr></thead><tbody id="tableBorrarBody" class="divide-y divide-gray-100"></tbody></table>
                    </div>
                    <button onclick="startDeletion()" class="w-full bg-orange hover:bg-orange/80 text-white font-bold py-3 rounded-xl transition shadow-lg flex items-center justify-center gap-2">🗑️ Borrar Seleccionados</button>
                    <div id="logBorrar" class="mt-4 bg-dark rounded-lg p-3 h-32 overflow-auto text-xs font-mono text-light"></div>
                </div>
            </div>
        </div>
            
        <!-- PANEL INDIVIDUAL -->
        <div id="panel-individual" class="tab-panel hidden">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <h3 class="font-semibold text-lg mb-4 text-dark">Buscar Usuario</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="searchDocId" placeholder="Ingrese Cedula" class="flex-1 border border-gray-200 rounded-lg px-4 py-2 focus:ring-2 focus:ring-primary focus:outline-none">
                        <button onclick="searchUser()" class="bg-primary text-white px-6 py-2 rounded-lg font-medium hover:bg-primary/80 transition">Buscar</button>
                    </div>
                    <button onclick="deleteIndividual()" class="w-full bg-orange/10 text-orange border border-orange/20 py-2 rounded-lg font-medium hover:bg-orange hover:text-white transition text-sm">Borrar usuario encontrado</button>
                </div>
                <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                    <h3 class="font-semibold text-lg mb-4 text-dark">Resultado</h3>
                    <pre id="resultIndividual" class="bg-dark text-green-400 p-4 rounded-lg text-xs overflow-auto h-64 font-mono">{ "mensaje": "Esperando..." }</pre>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- CONFIGURACIÓN ---
        const API_BASE = "/api/proxy"; 
        const ENDPOINTS = {
            new: `${API_BASE}?endpoint=user/new`,
            show: `${API_BASE}?endpoint=user/show`,
            delete: `${API_BASE}?endpoint=user/delete`,
            list: `${API_BASE}?endpoint=user/list`
        };

        // --- SEGURIDAD (FRONTEND) ---
        let currentPassword = localStorage.getItem('app_access_pass') || '';
        
        if (!currentPassword) {
            askForPassword();
        }

        function askForPassword() {
            const pass = prompt("Ingrese la clave de acceso:");
            if (pass) {
                currentPassword = pass;
                localStorage.setItem('app_access_pass', pass);
            } else {
                alert("Acceso denegado.");
            }
        }

        function resetPassword() {
            localStorage.removeItem('app_access_pass');
            location.reload();
        }

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'x-app-password': currentPassword
            };
        }

        function openTab(name) {
            document.querySelectorAll('.tab-panel').forEach(el => el.classList.add('hidden'));
            document.getElementById(`panel-${name}`).classList.remove('hidden');
            document.querySelectorAll('[id^="btn-"]').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(`btn-${name}`).classList.add('tab-active');
        }

        function log(msg, targetId) {
            const el = document.getElementById(targetId);
            const time = new Date().toLocaleTimeString();
            el.innerHTML += `<span class="text-gray-400">[${time}]</span> ${msg}\n`;
            el.scrollTop = el.scrollHeight;
        }

        // --- LÓGICA DE DATOS ---
        let dataCrear = [];
        let dataBorrar = [];

        function parseData(data, type) {
            let result = [];
            data.forEach(row => {
                row = row.map(cell => String(cell).trim());
                if (type === 'crear') {
                    if (row.length >= 3 && row[1] !== '') result.push({ nombre: row[0], cedula: row[1], pantallas: row[2] });
                } else {
                    let docId = row.length >= 3 ? row[1] : row[0];
                    if (docId) result.push({ cedula: docId });
                }
            });
            return result;
        }

        function renderTable(type) {
            const tbody = document.getElementById(`table${type.charAt(0).toUpperCase() + type.slice(1)}Body`);
            tbody.innerHTML = '';
            const data = type === 'crear' ? dataCrear : dataBorrar;
            data.forEach(item => {
                const tr = document.createElement('tr');
                if (type === 'crear') tr.innerHTML = `<td class="px-4 py-2">${item.nombre}</td><td class="px-4 py-2 font-mono text-blue">${item.cedula}</td><td class="px-4 py-2">${item.pantallas}</td>`;
                else tr.innerHTML = `<td class="px-4 py-2 font-mono text-orange">${item.cedula}</td>`;
                tbody.appendChild(tr);
            });
        }

        function processFile(type) {
            const fileInput = document.getElementById(`file${type.charAt(0).toUpperCase() + type.slice(1)}`);
            if (!fileInput.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { header: 1 });
                const filtered = jsonData.filter(row => row.length > 0 && row.join('').trim() !== '');
                if (type === 'crear') { dataCrear = parseData(filtered, 'crear'); renderTable('crear'); log(`✅ Archivo cargado: ${dataCrear.length} usuarios.`, 'logCrear'); }
                else { dataBorrar = parseData(filtered, 'borrar'); renderTable('borrar'); log(`✅ Archivo cargado: ${dataBorrar.length} usuarios.`, 'logBorrar'); }
            };
            reader.readAsArrayBuffer(fileInput.files[0]);
        }

        function processText(type) {
            const textArea = document.getElementById(`text${type.charAt(0).toUpperCase() + type.slice(1)}`);
            const lines = textArea.value.trim().split('\n').map(line => line.split(','));
            if (type === 'crear') { dataCrear = parseData(lines, 'crear'); renderTable('crear'); log(`✅ Texto procesado.`, 'logCrear'); }
            else { dataBorrar = parseData(lines, 'borrar'); renderTable('borrar'); log(`✅ Texto procesado.`, 'logBorrar'); }
        }

        // --- LLAMADAS API ---
        async function startCreation() {
            if (dataCrear.length === 0) return alert("No hay datos.");
            if (!confirm(`¿Crear ${dataCrear.length} usuarios?`)) return;
            document.getElementById('logCrear').innerHTML = ''; 
            for (const user of dataCrear) {
                try {
                    const res = await fetch(ENDPOINTS.new, { method: 'POST', headers: getHeaders(), body: JSON.stringify({ docid: user.cedula, nombre: user.nombre, max_connections: String(user.pantallas) }) });
                    const data = await res.json();
                    if (res.ok) log(`✅ OK: ${user.nombre}`, 'logCrear');
                    else log(`❌ Error: ${user.nombre} - ${data.error || JSON.stringify(data)}`, 'logCrear');
                } catch (err) { log(`❌ Conexión fallida`, 'logCrear'); }
                await new Promise(r => setTimeout(r, 200));
            }
            log("🏁 Finalizado.", 'logCrear');
        }

        async function startDeletion() {
            if (dataBorrar.length === 0) return alert("No hay datos.");
            if (!confirm(`⚠️ BORRAR ${dataBorrar.length} usuarios?`)) return;
            document.getElementById('logBorrar').innerHTML = '';
            for (const user of dataBorrar) {
                try {
                    const res = await fetch(ENDPOINTS.delete, { method: 'DELETE', headers: getHeaders(), body: JSON.stringify({ docid: user.cedula }) });
                    const data = await res.json();
                    if (res.ok) log(`✅ Borrado: ${user.cedula}`, 'logBorrar');
                    else log(`❌ Error: ${user.cedula} - ${data.error || JSON.stringify(data)}`, 'logBorrar');
                } catch (err) { log(`❌ Conexión fallida`, 'logBorrar'); }
                await new Promise(r => setTimeout(r, 200));
            }
            log("🏁 Finalizado.", 'logBorrar');
        }

        async function fetchList() {
            const page = document.getElementById('listPage').value;
            const limit = document.getElementById('listLimit').value;
            const tbody = document.getElementById('tableListaBody');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-secondary">Cargando...</td></tr>';
            
            try {
                const res = await fetch(`${ENDPOINTS.list}&page=${page}&limit=${limit}`, { method: 'GET', headers: getHeaders() });
                const data = await res.json();
                
                // --- NUEVA LÓGICA DE DETECCIÓN DE ERRORES ---
                // Si la API responde con un objeto de error directamente
                if (data.error) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center p-4 text-red-500 font-bold">Error API: ${data.error}</td></tr>`;
                    return;
                }
                // Si el proxy responde con error de autenticación
                if (!res.ok) {
                     tbody.innerHTML = `<tr><td colspan="5" class="text-center p-4 text-red-500 font-bold">Error ${res.status}: ${data.error || JSON.stringify(data)}</td></tr>`;
                     return;
                }

                // --- LÓGICA DE LISTA MEJORADA ---
                let users = [];
                if (Array.isArray(data)) {
                    users = data;
                } else if (data.data && Array.isArray(data.data)) {
                    users = data.data;
                } else if (data.users && Array.isArray(data.users)) {
                    users = data.users;
                } else if (data.results && Array.isArray(data.results)) {
                    users = data.results;
                } else {
                    // Si llegamos aquí, la estructura es desconocida
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center p-4 text-orange">Formato de respuesta desconocido.<br><small>${JSON.stringify(data)}</small></td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center p-4 text-secondary">La lista está vacía.</td></tr>';
                    return;
                }

                users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="px-4 py-2">${u.nombre || '-'}</td><td class="px-4 py-2 font-mono text-blue">${u.docid || u.username || '-'}</td><td class="px-4 py-2">${u.max_connections || '-'}</td><td class="px-4 py-2"><span class="px-2 py-1 text-xs rounded-full ${u.status === 'active' ? 'bg-green/10 text-green' : 'bg-gray-100 text-secondary'}">${u.status || '-'}</span></td><td class="px-4 py-2 text-xs text-textGray">${u._id || '-'}</td>`;
                    tbody.appendChild(tr);
                });

            } catch (err) { 
                tbody.innerHTML = `<tr><td colspan="5" class="text-center p-4 text-red-500">Error de Red: ${err.message}</td></tr>`; 
            }
        }

        async function searchUser() {
            const docId = document.getElementById('searchDocId').value;
            if (!docId) return alert("Ingrese una cédula.");
            
            const resBox = document.getElementById('resultIndividual');
            resBox.innerText = "Buscando...";
            
            try {
                // Construimos la URL correctamente: /api/proxy?endpoint=user/show&docid=VALOR
                const res = await fetch(`${ENDPOINTS.show}&docid=${docId}`, { method: 'GET', headers: getHeaders() });
                const data = await res.json();
                
                // Mostramos todo en el cuadro de resultado para depuración
                resBox.innerText = JSON.stringify(data, null, 4);
                
                if (data.error) {
                    resBox.innerText = `ERROR:\n${JSON.stringify(data, null, 4)}`;
                }
            } catch (err) { 
                resBox.innerText = `Error Crítico: ${err.message}`; 
            }
        }
        
        async function deleteIndividual() {
            const docId = document.getElementById('searchDocId').value;
            if (!docId) return alert("Ingrese una cédula en el campo de búsqueda primero.");
            if(!confirm(`¿Borrar usuario ${docId}?`)) return;
            
            const resBox = document.getElementById('resultIndividual');
            resBox.innerText = "Borrando...";
            
            try {
                const res = await fetch(ENDPOINTS.delete, { method: 'DELETE', headers: getHeaders(), body: JSON.stringify({ docid: docId }) });
                const data = await res.json();
                resBox.innerText = JSON.stringify(data, null, 4);
            } catch (err) { resBox.innerText = `Error: ${err.message}`; }
        }
    </script>
</body>
</html>
